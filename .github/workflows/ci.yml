name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Bundle gate worker (dry run)
        run: npx wrangler deploy --dry-run --config wrangler.toml
      - name: Bundle policy-publisher worker (dry run)
        run: npx wrangler deploy --dry-run --config wrangler.publisher.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: oidc-worker-gate-deploy
      cancel-in-progress: false
    # OIDC_CLIENT_SECRET and SESSION_HMAC_KEY are set once via `wrangler secret
    # put` and are preserved across deploys — this workflow never touches them.
    steps:
      - uses: actions/checkout@v4
      - name: Deploy gate worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml
      - name: Deploy policy-publisher worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.publisher.toml
